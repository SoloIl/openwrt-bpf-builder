name: Build OpenWrt x86_64 BPF

on:
  workflow_dispatch:
    inputs:
      openwrt_ref:
        description: OpenWrt source ref
        required: true
        default: v25.12.5
        type: string
      rootfs_size_mb:
        description: RootFS partition size in MB
        required: true
        default: "4096"
        type: string
      packages:
        description: Space-separated package list
        required: true
        default: luci luci-ssl kmod-ikconfig
        type: string

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build:
    name: build ${{ inputs.openwrt_ref }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      OPENWRT_REF: ${{ inputs.openwrt_ref }}
      ROOTFS_SIZE_MB: ${{ inputs.rootfs_size_mb }}
      PACKAGES: ${{ inputs.packages }}

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4
        with:
          path: builder

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 20480
          swap-size-mb: 8192
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"

      - name: Install build dependencies
        shell: bash
        run: |
          sudo apt clean
          sudo apt update
          sudo apt -y install \
            build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses5-dev \
            libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget curl ccache \
            subversion qemu-utils python3 python3-pip python3-ply python3-docutils \
            libelf-dev autoconf automake libtool pkgconf cmake ninja-build device-tree-compiler \
            texinfo patch xz-utils tar

      - name: Checkout OpenWrt source
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: ${{ inputs.openwrt_ref }}
          path: openwrt
          fetch-depth: 1

      - name: Prepare cache directories
        shell: bash
        run: |
          mkdir -p builder/.cache/ccache builder/.cache/dl

      - name: Cache downloads and ccache
        uses: actions/cache@v4
        with:
          path: |
            builder/.cache/ccache
            builder/.cache/dl
          key: openwrt-${{ runner.os }}-${{ inputs.openwrt_ref }}-${{ hashFiles('builder/config/**', 'builder/scripts/**', 'builder/.github/workflows/build-openwrt.yml') }}
          restore-keys: |
            openwrt-${{ runner.os }}-${{ inputs.openwrt_ref }}-
            openwrt-${{ runner.os }}-

      - name: Debug workspace
        shell: bash
        run: |
          set -euo pipefail
          echo "PWD=$PWD"
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          ls -la
          echo "--- top level ---"
          find . -maxdepth 3 -type f | sort
          echo "--- builder/scripts dir ---"
          ls -la builder/scripts || true
          echo "--- builder/config dir ---"
          ls -la builder/config || true

      - name: Configure build
        shell: bash
        run: |
          set -euo pipefail
          test -f "$GITHUB_WORKSPACE/builder/scripts/render-config.sh"
          chmod +x "$GITHUB_WORKSPACE/builder/scripts/render-config.sh"
          export ROOTFS_SIZE_MB
          "$GITHUB_WORKSPACE/builder/scripts/render-config.sh" \
            "$GITHUB_WORKSPACE/openwrt" \
            "$GITHUB_WORKSPACE/builder/config/x86-64-generic.seed" \
            "$GITHUB_WORKSPACE/builder/config/kernel-bpf-btf.fragment" \
            "$PACKAGES"
          cp "$GITHUB_WORKSPACE/openwrt/.config" "$GITHUB_WORKSPACE/openwrt/.config.seeded"

      - name: Update feeds and finalize .config
        shell: bash
        run: |
          set -euo pipefail
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          cp .config ../final.config

      - name: Download sources
        shell: bash
        run: |
          set -euo pipefail
          cd openwrt
          mkdir -p ../builder/.cache/dl
          rm -rf dl
          ln -sfn "$PWD/../builder/.cache/dl" dl
          make download -j"$(nproc)" || make download -j1 V=s

      - name: Build
        shell: bash
        env:
          CCACHE_DIR: ${{ github.workspace }}/builder/.cache/ccache
        run: |
          set -euo pipefail
          cd openwrt
          export CCACHE_DIR
          export CC="ccache gcc"
          export CXX="ccache g++"
          make -j"$(nproc)" V=s

      - name: Prepare artifact bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          cp final.config artifacts/.config
          cp openwrt/.config artifacts/openwrt.final.config
          cp openwrt/bin/targets/x86/64/config.buildinfo artifacts/
          cp openwrt/bin/targets/x86/64/feeds.buildinfo artifacts/
          cp openwrt/bin/targets/x86/64/sha256sums artifacts/

      - name: Upload target directory
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ inputs.openwrt_ref }}-x86-64-targets
          path: openwrt/bin/targets/x86/64/

      - name: Upload config bundle
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ inputs.openwrt_ref }}-config
          path: artifacts/
