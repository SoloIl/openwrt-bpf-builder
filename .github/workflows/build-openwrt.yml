name: Build OpenWrt x86_64 BPF

on:
  workflow_dispatch:
    inputs:
      openwrt_ref:
        description: OpenWrt source ref
        required: true
        default: v25.12.5
        type: string
      rootfs_size_mb:
        description: RootFS partition size in MB
        required: true
        default: "4096"
        type: string
      packages:
        description: Space-separated package list
        required: false
        default: ""
        type: string

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build:
    name: build ${{ inputs.openwrt_ref }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      OPENWRT_REF: ${{ inputs.openwrt_ref }}
      ROOTFS_SIZE_MB: ${{ inputs.rootfs_size_mb }}
      PACKAGES: ${{ inputs.packages }}

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          swap-size-mb: 8192
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"

      - name: Install build dependencies
        shell: bash
        run: |
          sudo rm -rf /var/lib/apt/lists/*
          sudo apt-get clean
          sudo apt-get update
          sudo apt-get -y install \
            bison build-essential ccache clang curl file flex \
            g++ g++-multilib gawk gcc-multilib genisoimage gettext git git-core gosu \
            libdw-dev libelf-dev libncurses5-dev libssl-dev locales pv pwgen python3 \
            python3-cryptography python3-pip python3-pyelftools python3-setuptools \
            python3-venv qemu-utils rsync signify-openbsd subversion swig unzip wget \
            zlib1g-dev zstd jq axel clang libelf-dev zlib1g-dev

      - name: Checkout builder repo
        uses: actions/checkout@v4
        with:
          path: builder

      - name: Checkout OpenWrt source
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: ${{ inputs.openwrt_ref }}
          path: openwrt
          fetch-depth: 1

      - name: Prepare cache directories
        shell: bash
        run: |
          mkdir -p builder/.cache/ccache builder/.cache/dl

      - name: Cache downloads and ccache
        uses: actions/cache@v4
        with:
          path: |
            builder/.cache/ccache
            builder/.cache/dl
          key: openwrt-${{ runner.os }}-${{ inputs.openwrt_ref }}-${{ hashFiles('builder/config/**', 'builder/scripts/**', 'builder/.github/workflows/build-openwrt.yml') }}
          restore-keys: |
            openwrt-${{ runner.os }}-${{ inputs.openwrt_ref }}-
            openwrt-${{ runner.os }}-

      - name: Debug workspace
        shell: bash
        run: |
          set -euo pipefail
          echo "PWD=$PWD"
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          ls -la
          echo "--- top level ---"
          find . -maxdepth 3 -type f | sort
          echo "--- builder/scripts dir ---"
          ls -la builder/scripts || true
          echo "--- builder/config dir ---"
          ls -la builder/config || true

      - name: Resolve official release URLs
        shell: bash
        run: |
          set -euo pipefail
          ref="${OPENWRT_REF#refs/tags/}"
          version="${ref#v}"

          if [[ "$ref" =~ ^v[0-9] ]]; then
            target_prefix="https://downloads.openwrt.org/releases/${version}/targets/x86/64"
          elif [[ "$ref" =~ ^(SNAPSHOT|snapshot|master|main)$ ]]; then
            target_prefix="https://downloads.openwrt.org/snapshots/targets/x86/64"
          else
            echo "unsupported openwrt_ref for official config.buildinfo: $OPENWRT_REF" >&2
            exit 1
          fi

          echo "TARGET_URL_PREFIX=$target_prefix" >> "$GITHUB_ENV"
          echo "CONFIG_BUILDINFO_URL=$target_prefix/config.buildinfo" >> "$GITHUB_ENV"
          echo "SHA256SUMS_URL=$target_prefix/sha256sums" >> "$GITHUB_ENV"

      - name: Prepare base config and prebuilt LLVM
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL "$CONFIG_BUILDINFO_URL" -o "$GITHUB_WORKSPACE/openwrt/.config"
          chmod +x "$GITHUB_WORKSPACE/builder/config/buildinfo.sh"
          ROOTFS_SIZE_MB="$ROOTFS_SIZE_MB" "$GITHUB_WORKSPACE/builder/config/buildinfo.sh" \
            "$GITHUB_WORKSPACE/openwrt/.config"

          sha256sums="$(curl -fsSL "$SHA256SUMS_URL")"
          llvm_bpf="$(sed -n '/\bllvm\b/{s|^[[:xdigit:]]*\s*\*||;p}' <<< "$sha256sums" | head -n1)"

          if [ -z "$llvm_bpf" ]; then
            echo "failed to find prebuilt llvm archive in sha256sums" >&2
            exit 1
          fi

          axel -q -n8 "$TARGET_URL_PREFIX/$llvm_bpf"
          tar -xf "$llvm_bpf" -C "$GITHUB_WORKSPACE/openwrt/"

      - name: Configure build
        shell: bash
        run: |
          set -euo pipefail
          cp "$GITHUB_WORKSPACE/openwrt/.config" "$GITHUB_WORKSPACE/openwrt/.config.seeded"

      - name: Update feeds and finalize .config
        shell: bash
        run: |
          set -euo pipefail
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          for pkg in $PACKAGES; do
            [ -n "$pkg" ] || continue
            if [[ "$pkg" == -* ]]; then
              sym="${pkg#-}"
              sym="${sym//-/_}"
              printf '# CONFIG_PACKAGE_%s is not set\n' "$sym" >> .config
            else
              sym="${pkg//-/_}"
              printf 'CONFIG_PACKAGE_%s=y\n' "$sym" >> .config
            fi
          done
          make defconfig
          cat ../builder/config/kernel-post-defconfig.fragment >> .config
          cp .config ../final.config

      - name: Build using rebuild order
        shell: bash
        env:
          CCACHE_DIR: ${{ github.workspace }}/builder/.cache/ccache
        run: |
          set -euo pipefail
          NPROC="$(nproc)"
          cd openwrt
          export CCACHE_DIR
          export CC="ccache gcc"
          export CXX="ccache g++"
          mkdir -p ../builder/.cache/dl
          rm -rf dl
          ln -sfn "$PWD/../builder/.cache/dl" dl
          make download -j"$NPROC" || make download -j1 V=s
          make prepare -j"$NPROC"
          make package/compile V=s -j"$NPROC" IGNORE_ERRORS=1
          make package/install -j"$NPROC"
          make target/install -j"$NPROC"
          make package/index
          make json_overview_image_info
          make checksum

      - name: Prepare artifact bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          cp final.config artifacts/.config
          cp openwrt/.config artifacts/openwrt.final.config
          cp openwrt/bin/targets/x86/64/config.buildinfo artifacts/
          cp openwrt/bin/targets/x86/64/feeds.buildinfo artifacts/
          cp openwrt/bin/targets/x86/64/sha256sums artifacts/

      - name: Upload target directory
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ inputs.openwrt_ref }}-x86-64-targets
          path: openwrt/bin/targets/x86/64/

      - name: Upload config bundle
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ inputs.openwrt_ref }}-config
          path: artifacts/

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        if: ${{ success() }}
        with:
          tag_name: ${{ inputs.openwrt_ref }}
          name: OpenWrt ${{ inputs.openwrt_ref }}
          make_latest: false
          files: |
            openwrt/bin/targets/x86/64/*combined-efi.img.gz
            openwrt/bin/targets/x86/64/sha256sums
            artifacts/.config
            artifacts/openwrt.final.config
